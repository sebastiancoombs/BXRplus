<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="BXR+ — the token economy your clients deserve">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="1080" cy="120" r="160" fill="#a78bfa" opacity="0.18"/>
  <circle cx="120" cy="540" r="200" fill="#6366f1" opacity="0.14"/>

  <!-- Trophy badge -->
  <g transform="translate(96 96)" filter="url(#glow)">
    <rect width="120" height="120" rx="28" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="60" y="84" font-size="72" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">🏆</text>
  </g>

  <!-- Wordmark -->
  <text x="240" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="76" font-weight="800" fill="#0f172a">
    BXR<tspan fill="url(#accent)">+</tspan>
  </text>

  <!-- Headline -->
  <text x="96" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="68" font-weight="800" fill="#0f172a">The token economy</text>
  <text x="96" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="68" font-weight="800" fill="url(#accent)">your clients deserve.</text>

  <!-- Subline -->
  <text x="96" y="476" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="500" fill="#475569">
    Built for BCBAs, RBTs, and parents — one shared system across
  </text>
  <text x="96" y="516" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="500" fill="#475569">
    clinic, school, and home.
  </text>

  <!-- Footer -->
  <text x="96" y="588" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#64748b">
    bxrplus.app
  </text>
  <text x="1104" y="588" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#64748b">
    Free for one client, forever.
  </text>
</svg>
