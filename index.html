<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />

    <!-- Primary -->
    <title>BXR+ — Token Economy Software for ABA Teams (BCBA, RBT, Parent)</title>
    <meta
      name="description"
      content="BXR+ is a shared token-economy app for ABA care teams. BCBAs, RBTs, and parents track behaviors, award points, and deliver reinforcement consistently across clinic, school, and home. Free for one client, forever."
    />
    <meta
      name="keywords"
      content="ABA token economy, BCBA software, RBT app, applied behavior analysis, behavior tracking app, reinforcement schedule, autism therapy software, point system for kids"
    />
    <link rel="canonical" href="https://bxrplus.app/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="BXR+" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BXR+" />
    <meta property="og:title" content="BXR+ — Token Economy for ABA Care Teams" />
    <meta
      property="og:description"
      content="Track behaviors, award points, and deliver reinforcement on time. Built for BCBAs, RBTs, and parents — one shared system across clinic, school, and home."
    />
    <meta property="og:url" content="https://bxrplus.app/" />
    <meta property="og:image" content="https://bxrplus.app/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BXR+ logo and tagline: the token economy your clients deserve" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BXR+ — Token Economy for ABA Care Teams" />
    <meta
      name="twitter:description"
      content="Track behaviors, award points, and deliver reinforcement on time. Free for one client, forever."
    />
    <meta name="twitter:image" content="https://bxrplus.app/og-image.svg" />

    <!-- Icons -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />

    <!-- Structured data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "BXR+",
        "url": "https://bxrplus.app/",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Web",
        "description": "A shared token-economy app for ABA care teams. BCBAs, RBTs, and parents track behaviors, award points, and deliver reinforcement consistently across clinic, school, and home.",
        "audience": {
          "@type": "Audience",
          "audienceType": "BCBAs, RBTs, parents, ABA care teams"
        },
        "offers": [
          {
            "@type": "Offer",
            "name": "Free Forever",
            "price": "0",
            "priceCurrency": "USD",
            "description": "1 client, full features, unlimited team members."
          },
          {
            "@type": "Offer",
            "name": "BXR+ Pro (monthly)",
            "price": "7",
            "priceCurrency": "USD",
            "description": "Unlimited clients per BCBA. RBTs and parents always free."
          },
          {
            "@type": "Offer",
            "name": "BXR+ Pro (yearly)",
            "price": "59",
            "priceCurrency": "USD",
            "description": "Unlimited clients per BCBA, billed annually."
          }
        ]
      }
    </script>

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "BXR+",
        "url": "https://bxrplus.app/",
